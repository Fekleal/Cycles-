<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENEX · PUER · CYCLICA</title>
  <style>
    :root {
      --bg: #f3f0e8;
      --surface: #fbfaf6;
      --ink: #22201c;
      --muted: #7d766b;
      --line: rgba(34, 32, 28, 0.14);
      --senex: #c83a3f;
      --puer: #d9a92e;
      --cyclica: #2f7fd7;
      --note: #fff4a9;
      --shadow: 0 7px 18px rgba(28, 24, 18, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 246, 0.93);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .brand {
      min-width: 250px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      letter-spacing: 0.17em;
      font-weight: 700;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: nowrap;
    }

    button, .file-button {
      height: 34px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdf8;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(28, 24, 18, 0.04);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select: none;
    }

    button:hover, .file-button:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 32, 28, 0.32);
      background: white;
    }

    button.danger:hover {
      color: #a52126;
      border-color: rgba(200, 58, 63, 0.55);
    }

    input[type="file"] { display: none; }

    #stage {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(217,169,46,.07), transparent 38%),
        radial-gradient(circle at 80% 100%, rgba(47,127,215,.08), transparent 40%),
        var(--bg);
    }

    #board {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .circle {
      fill: transparent;
      stroke-width: 4.2;
      vector-effect: non-scaling-stroke;
      opacity: .92;
    }

    .label {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .18em;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: var(--bg);
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .subtle-grid line {
      stroke: rgba(34,32,28,.035);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: min(420px, 64vw);
      color: rgba(34, 32, 28, .28);
      text-align: center;
      font-size: 16px;
      line-height: 1.35;
      pointer-events: none;
      user-select: none;
    }

    .note {
      position: absolute;
      width: 118px;
      min-height: 72px;
      border: 2px solid rgba(34, 32, 28, .16);
      border-radius: 7px 7px 12px 7px;
      background: var(--note);
      box-shadow: var(--shadow);
      transform: rotate(var(--r));
      cursor: grab;
      user-select: none;
      touch-action: none;
      overflow: hidden;
    }

    .note:active { cursor: grabbing; }

    .note.selected {
      outline: 2px solid rgba(34, 32, 28, .36);
      outline-offset: 2px;
      z-index: 9999 !important;
    }

    .note textarea {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 70px;
      padding: 10px 20px 16px 10px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px;
      line-height: 1.18;
      overflow: hidden;
      cursor: text;
    }

    .delete {
      position: absolute;
      right: 3px;
      top: 3px;
      width: 19px;
      height: 19px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(34,32,28,.18);
      background: rgba(255,255,255,.78);
      color: rgba(34,32,28,.62);
      font-size: 15px;
      line-height: 16px;
      box-shadow: none;
      z-index: 4;
    }

    .delete:hover {
      transform: none;
      color: #9c151b;
      border-color: rgba(200,58,63,.6);
      background: white;
    }

    .tag {
      position: absolute;
      left: 8px;
      bottom: 4px;
      max-width: calc(100% - 16px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 8px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(34,32,28,.52);
      pointer-events: none;
    }

    .legend {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(251, 250, 246, .86);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 12px rgba(28,24,18,.08);
      font-size: 12px;
      letter-spacing: .09em;
      z-index: 10;
      user-select: none;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend i {
      display: block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 2px solid currentColor;
    }

    .status {
      position: absolute;
      right: 14px;
      bottom: 14px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(251, 250, 246, .86);
      backdrop-filter: blur(8px);
      color: var(--muted);
      font-size: 12px;
      z-index: 10;
      user-select: none;
    }

    @media (max-width: 760px) {
      body { grid-template-rows: auto 1fr; overflow: auto; }
      header { align-items: flex-start; flex-direction: column; }
      .brand, h1, .subtitle { white-space: normal; }
      .toolbar { flex-wrap: wrap; justify-content: flex-start; }
      #stage { height: 760px; overflow: auto; }
      #board { width: 920px; height: 700px; inset: auto; }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <h1>SENEX · PUER · CYCLICA</h1>
      <div class="subtitle">Small draggable notes. Double-click empty space to create one.</div>
    </div>

    <div class="toolbar">
      <button id="add">+ Note</button>
      <button id="export">Export</button>
      <label class="file-button" for="import">Import</label>
      <input id="import" type="file" accept="application/json">
      <button id="clear" class="danger">Clear</button>
    </div>
  </header>

  <main id="stage">
    <div id="board">
      <svg id="venn" viewBox="0 0 1000 650" preserveAspectRatio="xMidYMid meet">
        <g class="subtle-grid" id="grid"></g>

        <circle id="senexShape" class="circle" cx="410" cy="295" r="180" stroke="var(--senex)" />
        <circle id="puerShape" class="circle" cx="590" cy="295" r="180" stroke="var(--puer)" />
        <circle id="cyclicaShape" class="circle" cx="500" cy="435" r="180" stroke="var(--cyclica)" />

        <text class="label" x="340" y="148" fill="var(--senex)">SENEX</text>
        <text class="label" x="660" y="148" fill="var(--puer)">PUER</text>
        <text class="label" x="500" y="604" fill="var(--cyclica)">CYCLICA</text>
      </svg>

      <div class="hint" id="hint">Create a note and drag it into SENEX, PUER, CYCLICA, or their overlaps.</div>

      <div class="legend">
        <span style="color: var(--senex)"><i></i>SENEX</span>
        <span style="color: var(--puer)"><i></i>PUER</span>
        <span style="color: var(--cyclica)"><i></i>CYCLICA</span>
      </div>
      <div class="status" id="status">Saved</div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "senex-puer-cyclica-board-v2";
    const board = document.getElementById("board");
    const hint = document.getElementById("hint");
    const statusEl = document.getElementById("status");

    const circles = [
      { key: "SENEX", color: "#c83a3f", cx: 410, cy: 295, r: 180 },
      { key: "PUER", color: "#d9a92e", cx: 590, cy: 295, r: 180 },
      { key: "CYCLICA", color: "#2f7fd7", cx: 500, cy: 435, r: 180 },
    ];

    let notes = [];
    let z = 20;
    let selected = null;

    function id() {
      return "n_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function randomRotation() {
      return (Math.random() * 2.6 - 1.3).toFixed(2) + "deg";
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      statusEl.textContent = "Saved";
      hint.style.display = notes.length ? "none" : "block";
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        notes = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(notes)) notes = [];
        z = notes.reduce((max, n) => Math.max(max, Number(n.z) || 20), 20);
      } catch {
        notes = [];
      }
    }

    function boardPointToSvg(clientX, clientY) {
      const svg = document.getElementById("venn");
      const pt = svg.createSVGPoint();
      pt.x = clientX;
      pt.y = clientY;
      const p = pt.matrixTransform(svg.getScreenCTM().inverse());
      return { x: p.x, y: p.y };
    }

    function traitsForElement(el) {
      const rect = el.getBoundingClientRect();
      const p = boardPointToSvg(rect.left + rect.width / 2, rect.top + rect.height / 2);
      return circles.filter(c => Math.hypot(p.x - c.cx, p.y - c.cy) <= c.r);
    }

    function traitText(traits) {
      return traits.length ? traits.map(t => t.key).join(" · ") : "UNPLACED";
    }

    function styleByTraits(el) {
      const traits = traitsForElement(el);
      el.querySelector(".tag").textContent = traitText(traits);

      if (traits.length === 0) {
        el.style.borderColor = "rgba(34,32,28,.20)";
        el.style.background = "#fff4a9";
        return;
      }

      if (traits.length === 1) {
        const c = traits[0].color;
        el.style.borderColor = c;
        el.style.background = `linear-gradient(135deg, ${c}25, #fff4a9 45%, ${c}12)`;
        return;
      }

      const colors = traits.map(t => t.color);
      el.style.borderColor = colors[0];

      if (colors.length === 2) {
        el.style.background = `linear-gradient(135deg, ${colors[0]}2f 0%, #fff4a9 48%, ${colors[1]}2f 100%)`;
      } else {
        el.style.background = `linear-gradient(135deg, ${colors[0]}2f 0%, #fff4a9 35%, ${colors[1]}2f 62%, ${colors[2]}2f 100%)`;
      }
    }

    function autosize(textarea) {
      textarea.style.height = "0px";
      textarea.style.height = Math.max(70, textarea.scrollHeight) + "px";
      const note = textarea.closest(".note");
      if (note) note.style.minHeight = Math.max(72, textarea.scrollHeight + 18) + "px";
    }

    function updateNote(noteId, patch) {
      const n = notes.find(x => x.id === noteId);
      if (!n) return;
      Object.assign(n, patch);
      save();
    }

    function render() {
      board.querySelectorAll(".note").forEach(n => n.remove());
      notes.forEach(createNoteElement);
      hint.style.display = notes.length ? "none" : "block";
    }

    function createNoteElement(n) {
      const el = document.createElement("div");
      el.className = "note";
      el.dataset.id = n.id;
      el.style.left = n.x + "px";
      el.style.top = n.y + "px";
      el.style.zIndex = n.z || 20;
      el.style.setProperty("--r", n.r || "0deg");

      const del = document.createElement("button");
      del.className = "delete";
      del.title = "Delete note";
      del.textContent = "×";

      const textarea = document.createElement("textarea");
      textarea.value = n.text || "";
      textarea.placeholder = "Idea";

      const tag = document.createElement("div");
      tag.className = "tag";
      tag.textContent = "UNPLACED";

      el.append(del, textarea, tag);
      board.appendChild(el);

      textarea.addEventListener("pointerdown", e => e.stopPropagation());
      textarea.addEventListener("input", () => {
        autosize(textarea);
        updateNote(n.id, { text: textarea.value });
        styleByTraits(el);
      });

      del.addEventListener("pointerdown", e => e.stopPropagation());
      del.addEventListener("click", e => {
        e.stopPropagation();
        notes = notes.filter(x => x.id !== n.id);
        if (selected === n.id) selected = null;
        el.remove();
        save();
      });

      el.addEventListener("pointerdown", beginDrag);
      autosize(textarea);
      requestAnimationFrame(() => styleByTraits(el));
      return el;
    }

    function select(noteId) {
      selected = noteId;
      board.querySelectorAll(".note").forEach(el => {
        el.classList.toggle("selected", el.dataset.id === selected);
      });
    }

    function addNoteAt(x, y, text = "") {
      const rect = board.getBoundingClientRect();
      const n = {
        id: id(),
        text,
        x: Math.max(8, Math.min(x, rect.width - 128)),
        y: Math.max(8, Math.min(y, rect.height - 88)),
        z: ++z,
        r: randomRotation()
      };
      notes.push(n);
      const el = createNoteElement(n);
      select(n.id);
      save();
      el.querySelector("textarea").focus();
      return n;
    }

    function beginDrag(e) {
      if (e.button !== undefined && e.button !== 0) return;
      const el = e.currentTarget;
      const noteId = el.dataset.id;
      const n = notes.find(x => x.id === noteId);
      if (!n) return;

      select(noteId);
      n.z = ++z;
      el.style.zIndex = n.z;

      const startX = e.clientX;
      const startY = e.clientY;
      const originX = n.x;
      const originY = n.y;
      const boardRect = board.getBoundingClientRect();

      el.setPointerCapture(e.pointerId);

      function move(ev) {
        const maxX = boardRect.width - el.offsetWidth - 8;
        const maxY = boardRect.height - el.offsetHeight - 8;
        n.x = Math.max(8, Math.min(originX + ev.clientX - startX, maxX));
        n.y = Math.max(8, Math.min(originY + ev.clientY - startY, maxY));
        el.style.left = n.x + "px";
        el.style.top = n.y + "px";
        styleByTraits(el);
        statusEl.textContent = el.querySelector(".tag").textContent;
      }

      function end() {
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", end);
        el.removeEventListener("pointercancel", end);
        updateNote(noteId, { x: n.x, y: n.y, z: n.z });
        styleByTraits(el);
      }

      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", end);
      el.addEventListener("pointercancel", end);
    }

    document.getElementById("add").addEventListener("click", () => {
      const rect = board.getBoundingClientRect();
      addNoteAt(rect.width / 2 - 59, rect.height / 2 - 36);
    });

    board.addEventListener("dblclick", e => {
      if (e.target.closest(".note")) return;
      const rect = board.getBoundingClientRect();
      addNoteAt(e.clientX - rect.left - 59, e.clientY - rect.top - 36);
    });

    board.addEventListener("pointerdown", e => {
      if (e.target === board || e.target.tagName.toLowerCase() === "svg") {
        select(null);
      }
    });

    document.getElementById("clear").addEventListener("click", () => {
      if (!confirm("Delete every note on this board?")) return;
      notes = [];
      selected = null;
      save();
      render();
    });

    document.getElementById("export").addEventListener("click", () => {
      const payload = {
        app: "SENEX-PUER-CYCLICA",
        version: 2,
        exportedAt: new Date().toISOString(),
        notes
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "senex-puer-cyclica-board.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById("import").addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        const incoming = Array.isArray(parsed) ? parsed : parsed.notes;
        if (!Array.isArray(incoming)) throw new Error("Invalid file.");
        notes = incoming.map(n => ({
          id: n.id || id(),
          text: String(n.text || ""),
          x: Number(n.x) || 50,
          y: Number(n.y) || 50,
          z: Number(n.z) || ++z,
          r: n.r || randomRotation()
        }));
        save();
        render();
      } catch {
        alert("This import file is not valid.");
      }
    });

    window.addEventListener("keydown", e => {
      const typing = document.activeElement && document.activeElement.tagName === "TEXTAREA";
      if ((e.key === "Delete" || e.key === "Backspace") && selected && !typing) {
        const el = board.querySelector(`[data-id="${selected}"]`);
        notes = notes.filter(x => x.id !== selected);
        if (el) el.remove();
        selected = null;
        save();
      }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n") {
        e.preventDefault();
        const rect = board.getBoundingClientRect();
        addNoteAt(rect.width / 2 - 59, rect.height / 2 - 36);
      }
    });

    window.addEventListener("resize", () => {
      board.querySelectorAll(".note").forEach(styleByTraits);
    });

    load();
    render();
  </script>
</body>
</html>
